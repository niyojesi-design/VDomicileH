<!DOCTYPE html>
<html lang="fr">
<head>

    <title>VDomicile - Contact</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;

        header {
            background-color: green;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav a {
            margin: 10px;

            font-weight: bold;

        nav a:hover {
            text-decoration: underline;
        }

        section {
            padding: 20px;
            display: flex;
            justify-content: center;
        }

            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

        footer {

            padding: 10px;

<header>
    <h1>Contact</h1>
    <nav>

        <h2>Contactez-nous</h2>
        <p>Email : contact@vdomicile.com</p>
        <p id="phone">Téléphone : +257 79 000 000</p>

        <button onclick="afficherNumero()">Afficher le numéro</button>
    </div>
</section>

<footer>

function afficherNumero() {
