<!DOCTYPE html>
<html lang="fr">

    <style>
        body {

            margin: 0;

        }

        header {
            background-color: green;
            color: white;
            text-align: center;
            padding: 15px;
        }

        nav a {
            margin: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        section {
            padding: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        li:hover {
            background: lightgreen;
            transform: scale(1.05);

            padding: 10px;

        }

    <nav>

        <li onclick="choisirProduit('Habits')">Habit</li>

<footer>
